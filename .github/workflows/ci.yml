name: CI

on:
  push:
    branches: [main]
    # Doc-only changes don't affect the build — skip CI.
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'

# Cancel an in-flight run when a newer commit lands on the same ref —
# saves the (capped at 5) macOS concurrency budget.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: macos-latest      # standard runner — free on public repos
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Pin the toolchain so the iOS 26.5 SDK is guaranteed present,
      # instead of relying on whatever Xcode the runner defaults to.
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep -i "iPad" || true

      - name: Run unit tests
        run: |
          # GitHub runs this step with `bash -e`; keep every simulator-resolution
          # command non-fatal (|| true) and use `if`, NOT `[ -z ] && …` — that exits 1
          # when DEST_ID is already set and aborts the whole step under errexit (it did:
          # an earlier run died here before xcodebuild even started). Parse
          # `xcodebuild -showdestinations` (scheme-valid destinations only) so we never
          # pin a device name the runner's Xcode renamed across chips (M4 → M5 → …).
          DESTS=$(xcodebuild -showdestinations -project MyInventory.xcodeproj -scheme MyInventory 2>/dev/null || true)
          DEST_ID=$(printf '%s\n' "$DESTS" | grep "platform:iOS Simulator" | grep "iPad Pro 11-inch" | grep -oE 'id:[0-9A-Fa-f-]{36}' | head -1 | cut -d: -f2 || true)
          if [ -z "$DEST_ID" ]; then
            DEST_ID=$(printf '%s\n' "$DESTS" | grep "platform:iOS Simulator" | grep "iPad" | grep -oE 'id:[0-9A-Fa-f-]{36}' | head -1 | cut -d: -f2 || true)
          fi
          echo "Using simulator: ${DEST_ID:-<none found>}"
          xcodebuild test \
            -project MyInventory.xcodeproj \
            -scheme MyInventory \
            -destination "platform=iOS Simulator,id=$DEST_ID" \
            -derivedDataPath build/DD \
            -only-testing:MyInventoryTests \
            CODE_SIGNING_ALLOWED=NO

  ui-tests:
    name: UI tests
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Parallel simulator clones intermittently fail to launch the unsigned
      # test runner ("Application failed preflight checks"), so run serially.
      - name: Run UI tests (serial)
        run: |
          # Resolve a scheme-valid iPad sim, errexit-safe (see the unit-tests step).
          DESTS=$(xcodebuild -showdestinations -project MyInventory.xcodeproj -scheme MyInventory 2>/dev/null || true)
          DEST_ID=$(printf '%s\n' "$DESTS" | grep "platform:iOS Simulator" | grep "iPad Pro 11-inch" | grep -oE 'id:[0-9A-Fa-f-]{36}' | head -1 | cut -d: -f2 || true)
          if [ -z "$DEST_ID" ]; then
            DEST_ID=$(printf '%s\n' "$DESTS" | grep "platform:iOS Simulator" | grep "iPad" | grep -oE 'id:[0-9A-Fa-f-]{36}' | head -1 | cut -d: -f2 || true)
          fi
          echo "Using simulator: ${DEST_ID:-<none found>}"
          xcodebuild test \
            -project MyInventory.xcodeproj \
            -scheme MyInventory \
            -destination "platform=iOS Simulator,id=$DEST_ID" \
            -derivedDataPath build/DD \
            -only-testing:MyInventoryUITests \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO
