name: CI

on:
  push:
    branches: [main]
    # Doc-only changes don't affect the build — skip CI.
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'

# Least-privilege token: CI only reads the repo (checkout); it never writes
# statuses, comments, or contents via GITHUB_TOKEN.
permissions:
  contents: read

# Cancel an in-flight run when a newer commit lands on the same ref —
# saves the (capped at 5) macOS concurrency budget.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: macos-latest      # standard runner — free on public repos
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Select the newest stable Xcode on the runner image. NOTE: `latest-stable`
      # is a floating selector, NOT a pin — each runner-image update can change
      # what it resolves to. We rely on the assumption that the newest stable
      # Xcode's iphonesimulator SDK is >= our iOS 26.0 deployment target (the
      # runner's *default* Xcode may be older). The action itself IS pinned by
      # commit SHA (third-party action + our merge discipline trusts CI green).
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0 (v1)
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep -i "iPad" || true

      - name: Run unit tests
        run: |
          # Resolve an iPad simulator from simctl JSON — NOT `xcodebuild -showdestinations`,
          # which on a fresh CI checkout returned nothing (the scheme's SPM package isn't
          # resolved yet) and left an empty -destination. simctl needs no project/scheme.
          # CONSTRAIN the pick to a runtime <= the iphonesimulator SDK that ships with the
          # selected Xcode: GitHub runners sometimes carry EXTRA, newer iOS runtimes whose
          # simulators xcodebuild can't drive — blindly taking the "newest" iPad landed on
          # one of those and xcodebuild rejected it ("Unable to find a destination", only
          # placeholders listed). A runtime <= SDK is eligible by construction (and the
          # SDK is assumed >= our 26.0 deployment target — see the Xcode-selection note
          # above). Pick the highest such iPad, preferring 11".
          # Errexit-safe (GitHub runs the step under `bash -e`); jq is preinstalled.
          SDK=$(xcrun --sdk iphonesimulator --show-sdk-version)
          echo "iphonesimulator SDK: $SDK"
          pick() {
            xcrun simctl list devices available --json | jq -r --arg pat "$1" --arg sdk "$SDK" '
              ($sdk | split(".") | map(tonumber)) as $sv
              | [ .devices | to_entries[]
                  | select(.key | test("SimRuntime\\.iOS-[0-9]"))
                  | (.key | capture("iOS-(?<v>[0-9-]+)").v) as $vs
                  | ($vs | split("-") | map(tonumber)) as $ver
                  | select($ver <= $sv)
                  | .value[] | select(.isAvailable and (.name | test($pat)))
                  | {udid, ver:$ver} ]
              | sort_by(.ver) | last | .udid // empty'
          }
          DEST_ID=$(pick "iPad Pro 11" || true)
          [ -z "$DEST_ID" ] && DEST_ID=$(pick "iPad Air 11" || true)
          [ -z "$DEST_ID" ] && DEST_ID=$(pick "iPad" || true)
          # No fallback past iPad: the app's layout is iPad-oriented, so a green run
          # on an iPhone would be a vacuous pass. Fail loudly instead.
          if [ -z "$DEST_ID" ]; then
            echo "::error::No iPad simulator with a runtime <= SDK $SDK on this runner image — refusing to fall back to a non-iPad device. Available devices:"
            xcrun simctl list devices available || true
            exit 1
          fi
          echo "Using simulator: $DEST_ID"
          # Serial, like the UI job: parallel simulator clones intermittently fail to
          # launch the unsigned test runner ("crashed while preparing to run tests" →
          # Exceeded max restart count), which flakes the whole job. Class-parallelism
          # buys nothing here — the suite runs in ~1.5s.
          xcodebuild test \
            -project MyInventory.xcodeproj \
            -scheme MyInventory \
            -destination "platform=iOS Simulator,id=$DEST_ID" \
            -derivedDataPath build/DD \
            -only-testing:MyInventoryTests \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO

      # Crash-report safety net. This originally caught the flaky `malloc` double-free
      # that only reproduced on the CI toolchain (Xcode 26.3, not local 26.6): its `.ips`
      # backtrace pinned the cause to an Apple isolated-deinit runtime bug, fixed by the
      # `nonisolated deinit` in SettingsStore/FakeSyncTransport. Kept as a permanent
      # diagnostic — xcodebuild's log shows only the malloc line, so on ANY future native
      # crash this surfaces the symbolicated simulator crash report (which binary faulted).
      - name: Dump crash reports on failure
        if: ${{ failure() }}
        run: |
          echo "=== DiagnosticReports (host) ==="
          ls -lt "$HOME/Library/Logs/DiagnosticReports/" 2>/dev/null || true
          shopt -s nullglob
          for f in "$HOME"/Library/Logs/DiagnosticReports/MyInventory-*.ips "$HOME"/Library/Logs/DiagnosticReports/MyInventory_*.ips; do
            echo "===== $f ====="
            cat "$f" || true
          done
          echo "=== crashes inside the simulator container ==="
          find "$HOME/Library/Developer/CoreSimulator/Devices" -name 'MyInventory*.ips' -o -name 'MyInventory*.crash' 2>/dev/null | while read -r f; do
            echo "===== $f ====="; cat "$f" || true
          done

  ui-tests:
    name: UI tests
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0 (v1)
        with:
          xcode-version: latest-stable

      # Parallel simulator clones intermittently fail to launch the unsigned
      # test runner ("Application failed preflight checks"), so run serially.
      - name: Run UI tests (serial)
        run: |
          # Resolve an iPad simulator under a runtime <= the iphonesimulator SDK,
          # errexit-safe (see unit-tests for the full rationale).
          SDK=$(xcrun --sdk iphonesimulator --show-sdk-version)
          echo "iphonesimulator SDK: $SDK"
          pick() {
            xcrun simctl list devices available --json | jq -r --arg pat "$1" --arg sdk "$SDK" '
              ($sdk | split(".") | map(tonumber)) as $sv
              | [ .devices | to_entries[]
                  | select(.key | test("SimRuntime\\.iOS-[0-9]"))
                  | (.key | capture("iOS-(?<v>[0-9-]+)").v) as $vs
                  | ($vs | split("-") | map(tonumber)) as $ver
                  | select($ver <= $sv)
                  | .value[] | select(.isAvailable and (.name | test($pat)))
                  | {udid, ver:$ver} ]
              | sort_by(.ver) | last | .udid // empty'
          }
          DEST_ID=$(pick "iPad Pro 11" || true)
          [ -z "$DEST_ID" ] && DEST_ID=$(pick "iPad Air 11" || true)
          [ -z "$DEST_ID" ] && DEST_ID=$(pick "iPad" || true)
          # No fallback past iPad: the app's layout is iPad-oriented, so a green run
          # on an iPhone would be a vacuous pass. Fail loudly instead.
          if [ -z "$DEST_ID" ]; then
            echo "::error::No iPad simulator with a runtime <= SDK $SDK on this runner image — refusing to fall back to a non-iPad device. Available devices:"
            xcrun simctl list devices available || true
            exit 1
          fi
          echo "Using simulator: $DEST_ID"
          xcodebuild test \
            -project MyInventory.xcodeproj \
            -scheme MyInventory \
            -destination "platform=iOS Simulator,id=$DEST_ID" \
            -derivedDataPath build/DD \
            -only-testing:MyInventoryUITests \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO
